services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: restaurant-finder-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: restaurant-finder-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend